<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        (function () {
  const head = document.head;

  const link1 = document.createElement("link");
  link1.rel = "stylesheet";
  link1.href = "css/style.css";
  head.appendChild(link1);

  const pre1 = document.createElement("link");
  pre1.rel = "preconnect";
  pre1.href = "https://fonts.googleapis.com";
  head.appendChild(pre1);

  const pre2 = document.createElement("link");
  pre2.rel = "preconnect";
  pre2.href = "https://fonts.gstatic.com";
  pre2.crossOrigin = "anonymous";
  head.appendChild(pre2);

  const googleFont = document.createElement("link");
  googleFont.href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap";
  googleFont.rel = "stylesheet";
  head.appendChild(googleFont);

  const body = document.body;

  const main = document.createElement("main");
  main.className = "page-content";
  body.appendChild(main);

  const chatToggle = document.createElement("button");
  chatToggle.id = "chat-toggle";
  chatToggle.className = "chat-toggle";
  chatToggle.setAttribute("aria-label", "Open Montfort Assistant");
  chatToggle.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" 
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" 
      stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span class="pulse-ring"></span>
  `;
  body.appendChild(chatToggle);

  const widget = document.createElement("section");
  widget.id = "chat-widget";
  widget.className = "chat-widget hidden";
  widget.setAttribute("aria-hidden", "true");
  widget.setAttribute("aria-label", "Montfort ICSE Assistant");

  const header = document.createElement("header");
  header.className = "chat-header";
  header.innerHTML = `
    <div class="chat-avatar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" 
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5
          a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </div>

    <div class="chat-header-text">
      <h2>Montfort ICSE Assistant</h2>
      <p class="status">
        <span class="status-indicator"></span> Online
      </p>
    </div>

    <button id="chat-close" class="action-btn" aria-label="Close chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" 
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  `;
  widget.appendChild(header);

  const messages = document.createElement("div");
  messages.id = "chat-messages";
  messages.className = "chat-messages";
  widget.appendChild(messages);

  const form = document.createElement("form");
  form.id = "chat-form";
  form.className = "chat-input-area";
  form.setAttribute("autocomplete", "off");

  form.innerHTML = `
      <div class="input-wrapper">
        <input id="chat-input" type="text"
          placeholder="Type your question here..."
          aria-label="Chat input" required />
        <button type="submit" class="send-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
  `;
  widget.appendChild(form);

  body.appendChild(widget);

  const audioTyping = document.createElement("audio");
  audioTyping.id = "typing-sound";
  audioTyping.innerHTML = `<source src="audio/typing.mp3" type="audio/mpeg">`;
  body.appendChild(audioTyping);

  const audioDelivered = document.createElement("audio");
  audioDelivered.id = "delivered-sound";
  audioDelivered.innerHTML = `<source src="audio/delivered.mp3" type="audio/mpeg">`;
  body.appendChild(audioDelivered);

  const audioOpen = document.createElement("audio");
  audioOpen.id = "open-sound";
  audioOpen.innerHTML = `<source src="audio/open.mp3" type="audio/mpeg">`;
  body.appendChild(audioOpen);

  const audioClose = document.createElement("audio");
  audioClose.id = "close-sound";
  audioClose.innerHTML = `<source src="audio/close.mp3" type="audio/mpeg">`;
  body.appendChild(audioClose);

  function loadScript(src) {
    const s = document.createElement("script");
    s.src = src;
    document.body.appendChild(s);
  }

  loadScript("config/settings.js");
  loadScript("js/utils.js");
  loadScript("js/context.js");
  loadScript("js/gemini.js");
  loadScript("js/search.js");
  loadScript("js/main.js");
})();

    </script>
</body>
</html>
