<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Montfort ICSE – School Chatbot Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Your normal website content -->
    <main class="page-content">
      <h1>Welcome to Montfort ICSE, Manapparai</h1>
      <p>
        Use the chat button at the bottom-right to talk to our AI assistant for
        basic school information.
      </p>
    </main>

    <!-- Floating Chat Button -->
    <button id="chat-toggle" aria-label="Open Montfort Assistant" class="chat-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span class="pulse-ring"></span>
    </button>

    <!-- Chat Widget -->
    <section
      id="chat-widget"
      aria-label="Montfort ICSE Assistant"
      aria-hidden="true"
      class="chat-widget hidden"
    >
      <header class="chat-header">
        <div class="chat-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <div class="chat-header-text">
          <h2>Montfort ICSE Assistant</h2>
          <p class="status">
            <span class="status-indicator"></span>
            Online
          </p>
        </div>
        <button id="chat-close" aria-label="Close chat" class="action-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </header>

      <div id="chat-messages" class="chat-messages"></div>

      <div id="chat-typing" class="chat-typing hidden">
        <div class="typing-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <div class="typing-indicator">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <form id="chat-form" class="chat-input-area" autocomplete="off">
        <div class="input-wrapper">
          <input
            id="chat-input"
            type="text"
            placeholder="Type your question here..."
            aria-label="Chat input"
            required
          />
          <button type="submit" class="send-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
    </section>

    <!-- Scripts (order matters) -->
    <script src="config/settings.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/context.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
